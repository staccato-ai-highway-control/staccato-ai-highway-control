# Legacy Notice:
# This root docker-compose.yml is kept for previous local integration development reference.
# Current official Docker runtime is limited to AI-VM only.
# DB-VM, FLASK-VM, FRONTEND-VM, and ITS-VM do not use Docker in the current VM runtime.
# See docs/infra/server-folder-map.md and docs/infra/repository-cleanup-policy.md.
﻿services:
  frontend-server:
    build:
      context: ./frontend-server
      dockerfile: Dockerfile
    container_name: staccato-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - flask-server
    networks:
      - staccato-network

  flask-server:
    build:
      context: ./flask-server
      dockerfile: Dockerfile
    container_name: staccato-flask
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      db-server:
        condition: service_healthy
      its-server:
        condition: service_started
      llm-server:
        condition: service_started
    volumes:
      - ./storage:/app/storage
    networks:
      - staccato-network

  its-server:
    build:
      context: ./its-server
      dockerfile: Dockerfile
    container_name: staccato-its
    ports:
      - "${ITS_PORT:-8002}:8002"
    env_file:
      - .env
    networks:
      - staccato-network

  llm-server:
    build:
      context: ./ai-vm/llm-server
      dockerfile: Dockerfile
    container_name: staccato-llm
    ports:
      - "${LLM_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    networks:
      - staccato-network

  db-server:
    image: mysql:8.0
    container_name: staccato-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-staccato}
      MYSQL_USER: ${MYSQL_USER:-staccato_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-staccato_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - staccato_mysql_data:/var/lib/mysql
      - ./db-server/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staccato-network

volumes:
  staccato_mysql_data:

networks:
  staccato-network:
    driver: bridge
