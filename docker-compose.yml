services:
  frontend-server:
    build:
      context: ./frontend-server
      dockerfile: Dockerfile
    container_name: staccato-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - flask-server
    networks:
      - staccato-network

  flask-server:
    build:
      context: ./flask-server
      dockerfile: Dockerfile
    container_name: staccato-flask
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      db-server:
        condition: service_healthy
      ai-server:
        condition: service_started
      its-server:
        condition: service_started
    volumes:
      - ./storage:/app/storage
    networks:
      - staccato-network

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: staccato-ai
    ports:
      - "${AI_PORT:-8001}:8001"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    networks:
      - staccato-network

  its-server:
    build:
      context: ./its-server
      dockerfile: Dockerfile
    container_name: staccato-its
    ports:
      - "${ITS_PORT:-8002}:8002"
    env_file:
      - .env
    networks:
      - staccato-network

  db-server:
    image: mysql:8.0
    container_name: staccato-db
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-staccato}
      MYSQL_USER: ${MYSQL_USER:-staccato_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-staccato_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - staccato_mysql_data:/var/lib/mysql
      - ./db-server/init:/docker-entrypoint-initdb.d:ro
      - ./db-server/conf:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - staccato-network

volumes:
  staccato_mysql_data:

networks:
  staccato-network:
    driver: bridge